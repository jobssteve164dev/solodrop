name: Deploy Link Service

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

concurrency:
  group: solodrop-link-service
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run worker:check
      - name: Deploy link service
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "::error::CLOUDFLARE_API_TOKEN is missing"; exit 1; }
          npx wrangler deploy --config worker/wrangler.jsonc
      - name: Verify production service
        run: |
          node -e "fetch('https://drop.szlk.ai/health').then(async r=>{const d=await r.json();if(!r.ok||d.ok!==true||d.service!=='SoloDrop')process.exit(1)})"
